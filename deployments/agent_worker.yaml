apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse-agent-worker
  labels:
    app: synapse-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synapse-worker
  template:
    metadata:
      labels:
        app: synapse-worker
    spec:
      containers:
      - name: agent-worker
        image: synapse-agent-worker:latest 
        imagePullPolicy: Never
        env:
        - name: BROKER_HOST
          value: "synapse-broker-service"
        - name: BROKER_PORT
          value: "8080"
        - name: CONSUMER_NAMESPACE
          value: "example-input"
        - name: PRODUCER_NAMESPACE
          value: "agent-worker-output"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"